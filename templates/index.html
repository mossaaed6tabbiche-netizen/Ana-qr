<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mossaad QR الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; color: #f8fafc; overflow-x: hidden; }

        /* واجهة ترحيب سينمائية */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 300% 300%;
            animation: gradientBG 5s ease infinite;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .splash-logo {
            width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #818cf8; border-radius: 20px; display: flex;
            justify-content: center; align-items: center; font-size: 40px;
            animation: pulse 2s infinite; margin-bottom: 25px; color: white; font-weight: bold;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); padding: 30px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); width: 100%; max-width: 480px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); display: none; }
        .page { display: none; } .page.active { display: block; }
        .menu-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .menu-btn { width: 100%; padding: 18px; font-size: 18px; font-weight: 700; border-radius: 16px; border: none; cursor: pointer; color: white; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-create-menu { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); }
        .btn-scan-menu { background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 100%); }
        .btn-share-menu { background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%); }
        
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; color: white; margin-bottom: 12px; }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%); }
        .btn-back { background: #334155; color: #cbd5e1; margin-top: 15px; }
        .btn-success { background: linear-gradient(135deg, #059669 0%, #10b981 100%); }
        .btn-share { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); }
        
        input[type="text"] { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: #fff; font-size: 16px; text-align: right; }
        .color-picker-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .color-item { flex: 1; }
        .color-item input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
        
        .qr-card { background: white; padding: 15px; border-radius: 16px; display: inline-block; margin-bottom: 10px; }
        #reader { width: 100%; background: #0f172a; border-radius: 16px; overflow: hidden; border: 2px solid #334155; margin-top: 15px; display: none; }
        #scanResult { margin-top: 15px; padding: 15px; background: #0f172a; border-radius: 12px; border: 1px solid #334155; display: none; text-align: right; }
        input[type="file"] { display: none; }
        footer { margin-top: 20px; font-size: 13px; color: #64748b; }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div class="splash-logo">QR</div>
        <h1 style="color: white; font-weight: 700; font-size: 32px; letter-spacing: 2px;">Mossaad QR 🚀</h1>
        <p style="color: #a5b4fc; margin-top: 10px;">تكنولوجيا الأكواد الذكية</p>
    </div>

    <div class="container" id="mainContainer">
        <div id="menuPage" class="page active">
            <h1 style="font-size: 24px;">القائمة الرئيسية 📱</h1>
            <div class="menu-grid">
                <button class="menu-btn btn-create-menu" onclick="navigateTo('generatePage')">إنشاء كود Mossaad</button>
                <button class="menu-btn btn-scan-menu" onclick="navigateTo('scanPage')">قراءة كود QR</button>
                <button class="menu-btn btn-share-menu" onclick="shareAppLink()">مشاركة التطبيق</button>
            </div>
        </div>

        <div id="generatePage" class="page">
            <h2>إنشاء كود جديد ✨</h2>
            <form id="qrForm" onsubmit="generateQR(event)">
                <input type="text" id="data" placeholder="انسخ الرابط هنا..." required>
                <div class="color-picker-group">
                    <div class="color-item"><label>لون الكود:</label><input type="color" id="fgColor" value="#000000"></div>
                    <div class="color-item"><label>الخلفية:</label><input type="color" id="bgColor" value="#ffffff"></div>
                </div>
                <button type="submit" class="btn btn-primary">توليد الكود</button>
            </form>
            <div id="resultArea" style="display:none; text-align:center;">
                <div class="qr-card"><div id="qrcode"></div></div>
                <button onclick="downloadQR()" class="btn btn-success">تحميل 📥</button>
            </div>
            <button class="btn btn-back" onclick="navigateTo('menuPage')">العودة للرئيسية</button>
        </div>

        <div id="scanPage" class="page">
            <h2>قراءة كود QR 🔍</h2>
            <button id="startCamBtn" onclick="startScanner()" class="btn btn-primary">تشغيل الكاميرا 📸</button>
            <label for="fileInput" class="btn btn-scan-menu">اختيار صورة من الملفات 📂</label>
            <input type="file" id="fileInput" accept="image/*" onchange="scanLocalFile(event)">
            <div id="reader"></div>
            <div id="scanResult"><strong style="color: #10b981;">النتيجة:</strong><p id="resultText"></p></div>
            <button class="btn btn-back" onclick="handleScanBack()">العودة للرئيسية</button>
        </div>
    </div>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.getElementById('splashScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('mainContainer').style.display = 'block', 500);
            }, 3000);
        });

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function generateQR(e) {
            e.preventDefault();
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: document.getElementById('data').value,
                width: 200, height: 200,
                colorDark: document.getElementById('fgColor').value,
                colorLight: document.getElementById('bgColor').value
            });
            document.getElementById('resultArea').style.display = 'block';
        }

        function startScanner() {
            document.getElementById('reader').style.display = 'block';
            const scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                showResult(text); scanner.stop();
            });
        }

        function scanLocalFile(e) {
            new Html5Qrcode("reader").scanFile(e.target.files[0], true).then(showResult);
        }

        function showResult(text) {
            document.getElementById('scanResult').style.display = 'block';
            document.getElementById('resultText').innerText = text;
        }

        function handleScanBack() { document.getElementById('reader').style.display = 'none'; navigateTo('menuPage'); }
        function shareAppLink() { if(navigator.share) navigator.share({title: 'Mossaad QR', url: window.location.href}); }
    </script>
</body>
</html>
