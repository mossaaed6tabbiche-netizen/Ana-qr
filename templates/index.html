<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُولّد أكواد QR الاحترافي - مسعد طبيش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: right;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: right;
        }
        input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
        }
        .color-picker-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: space-between;
        }
        .color-item {
            flex: 1;
            text-align: right;
        }
        .color-item input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: none;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-success {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .btn-share {
            background: linear-gradient(135deg, #d97706 0%, #f59e0b 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }
        .result-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px dashed #334155;
            display: none;
        }
        .qr-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .qr-card canvas, .qr-card img {
            display: block;
            margin: 0 auto;
            max-width: 200px;
            height: auto;
        }
        .history-section {
            margin-top: 25px;
            text-align: right;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }
        .history-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #cbd5e1;
        }
        .history-list {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
        }
        .history-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #1e293b;
        }
        .history-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
            direction: ltr;
        }
        .btn-recreate {
            background: #334155;
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        footer {
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
        footer span {
            color: #6366f1;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مُولّد أكواد QR الاحترافي 🚀</h1>
        <p class="subtitle">اصنع، خصّص ألوانك، وتصفح سجل الأكواد السابقة بكل سهولة.</p>

        <form id="qrForm" onsubmit="generateQR(event)">
            <div class="form-group">
                <label for="data">الرابط أو النص:</label>
                <input type="text" id="data" placeholder="انسخ الرابط هنا..." required>
            </div>

            <!-- ميزة تخصيص الألوان -->
            <div class="color-picker-group">
                <div class="color-item">
                    <label>لون الكود:</label>
                    <input type="color" id="fgColor" value="#000000">
                </div>
                <div class="color-item">
                    <label>خلفية الكود:</label>
                    <input type="color" id="bgColor" value="#ffffff">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">توليد وتخصيص الكود ✨</button>
        </form>

        <div class="result-section" id="resultArea">
            <h3 style="margin-bottom: 15px; color: #cbd5e1;">كود الـ QR الخاص بك جاهز:</h3>
            <div class="qr-card">
                <div id="qrcode"></div>
            </div>
            
            <!-- أزرار التحميل والمشاركة السريعة -->
            <div class="actions-grid">
                <button onclick="downloadQR()" class="btn btn-success">تحميل 📥</button>
                <button onclick="shareQR()" class="btn btn-share">مشاركة 🔗</button>
            </div>
        </div>

        <!-- ميزة السجل الحافظ للتاريخ -->
        <div class="history-section" id="historySection" style="display: none;">
            <div class="history-title">الأكواد الأخيرة الصادرة:</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <footer>
        تطوير وبرمجة بواسطة <span>مسعد طبيش</span> © 2026
    </footer>

    <script>
        let qrcodeInstance = null;

        // تشغيل السجل عند تحميل الصفحة
        document.addEventListener("DOMContentLoaded", displayHistory);

        function generateQR(event, textValue = null) {
            if(event) event.preventDefault();
            
            const dataInput = textValue || document.getElementById('data').value;
            if (!textValue) document.getElementById('data').value = dataInput;

            const fgColor = document.getElementById('fgColor').value;
            const bgColor = document.getElementById('bgColor').value;
            const qrContainer = document.getElementById('qrcode');
            
            qrContainer.innerHTML = '';
            
            qrcodeInstance = new QRCode(qrContainer, {
                text: dataInput,
                width: 200,
                height: 200,
                colorDark : fgColor,
                colorLight : bgColor,
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById('resultArea').style.display = 'block';

            if (!textValue) {
                saveToHistory(dataInput);
            }
        }

        function downloadQR() {
            const qrImg = document.querySelector('#qrcode img');
            const qrCanvas = document.querySelector('#qrcode canvas');
            let downloadUrl = qrImg?.src || qrCanvas?.toDataURL("image/png");

            if (downloadUrl) {
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = 'qrcode_mossaed.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        // ميزة المشاركة الذكية عبر الـ Web API
        async function shareQR() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            if (!qrCanvas) return;

            qrCanvas.toBlob(async (blob) => {
                const file = new File([blob], 'qrcode.png', { type: blob.type });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'كود QR الخاص بي',
                            text: 'تم التوليد عبر تطبيق مسعد طبيش'
                        });
                    } catch (err) {
                        alert("المشاركة مدعومة فقط داخل التطبيق الفعلي!");
                    }
                } else {
                    alert("نظام التشغيل لا يدعم مشاركة الملفات مباشرة.");
                }
            });
        }

        // حفظ الأكواد في الذاكرة الـ LocalStorage
        function saveToHistory(text) {
            let history = JSON.parse(localStorage.getItem('qr_history')) || [];
            if (!history.includes(text)) {
                history.unshift(text); // إضافة في البداية
                if (history.length > 5) history.pop(); // الاحتفاظ بآخر 5 فقط
                localStorage.setItem('qr_history', JSON.stringify(history));
                displayHistory();
            }
        }

        // عرض السجل للمستخدم
        function displayHistory() {
            let history = JSON.parse(localStorage.getItem('qr_history')) || [];
            const list = document.getElementById('historyList');
            const section = document.getElementById('historySection');

            if (history.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = '';

            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <button class="btn-recreate" onclick="generateQR(null, '${item}')">توليد</button>
                    <div class="history-text">${item}</div>
                `;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
