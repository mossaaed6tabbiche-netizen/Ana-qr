<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُولّد أكواد QR الذكي - مسعد طبيش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: right;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: right;
        }
        input[type="text"]:focus {
            border-color: #6366f1;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
            margin-top: 15px;
        }
        .result-section {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px dashed #334155;
            display: none; /* مخفي في البداية ويظهر فوراً عند التوليد */
        }
        .qr-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .qr-card canvas, .qr-card img {
            display: block;
            margin: 0 auto;
            max-width: 200px;
            height: auto;
        }
        .success-msg {
            color: #10b981;
            font-size: 14px;
            margin-top: 8px;
            font-weight: 600;
        }
        footer {
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
        footer span {
            color: #6366f1;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>مُولّد أكواد QR الذكي 📱</h1>
        <p class="subtitle">اكتب أي رابط أو نص ليتم تحويله فوراً إلى كود قابل للمسح.</p>

        <form id="qrForm" onsubmit="generateQR(event)">
            <div class="form-group">
                <label for="data">الرابط أو النص:</label>
                <input type="text" id="data" placeholder="انسخ الرابط هنا..." required>
            </div>
            <button type="submit" class="btn btn-primary">توليد الكود الآن ✨</button>
        </form>

        <div class="result-section" id="resultArea">
            <h3 style="margin-bottom: 15px; color: #cbd5e1;">كود الـ QR الخاص بك جاهز:</h3>
            <div class="qr-card">
                <div id="qrcode"></div>
            </div>
            <button onclick="downloadQR()" class="btn btn-success">تحميل كود الـ QR مباشرة 📥</button>
            <p class="success-msg">تم التوليد بنجاح!</p>
        </div>
    </div>

    <footer>
        تطوير وبرمجة بواسطة <span>مسعد طبيش</span> © 2026
    </footer>

    <script>
        let qrcodeInstance = null;

        function generateQR(event) {
            event.preventDefault();
            const dataInput = document.getElementById('data').value;
            const qrContainer = document.getElementById('qrcode');
            
            // تنظيف الكود القديم إن وجد
            qrContainer.innerHTML = '';
            
            // توليد الـ QR كود الجديد فوراً
            qrcodeInstance = new QRCode(qrContainer, {
                text: dataInput,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // إظهار منطقة النتيجة
            document.getElementById('resultArea').style.display = 'block';
        }

        function downloadQR() {
            // جلب الصورة المولدة من داخل مكتبة QRCode
            const qrImg = document.querySelector('#qrcode img');
            const qrCanvas = document.querySelector('#qrcode canvas');
            
            let downloadUrl = '';
            if (qrImg && qrImg.src) {
                downloadUrl = qrImg.src;
            } else if (qrCanvas) {
                downloadUrl = qrCanvas.toDataURL("image/png");
            }

            if (downloadUrl) {
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = 'qrcode_mossaed.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
